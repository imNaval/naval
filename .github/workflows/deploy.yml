name: Deploy React App to Hostinger

on:
  push:
    branches:
      - main # Agar aapki branch ka naam 'master' hai toh wahan 'master' likhein

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Apna node version daalein

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build # Vite hai toh npm run build hi use hota hai

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/ # Agar Vite use kiya hai toh './dist/' likhein
          server-dir: /public_html/